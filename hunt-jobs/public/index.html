<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUNT — Job Pipeline Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080b12;
  --s1: #0e1420;
  --s2: #141c2e;
  --border: #1e2a42;
  --accent: #4ade80;
  --accent2: #38bdf8;
  --warn: #fbbf24;
  --danger: #f87171;
  --text: #e2e8f0;
  --muted: #4a5568;
  --navy: #1e3a5f;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-weight: 300; min-height: 100vh; }
body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(74,222,128,0.06), transparent);
  pointer-events: none; z-index: 0;
}

/* ── Layout ── */
.app { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 24px 60px; }

/* ── Header ── */
header {
  padding: 28px 0 20px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); margin-bottom: 32px;
}
.logo { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: 8px; color: var(--accent); }
.run-info { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-align: right; }
.run-info span { color: var(--accent2); }

/* ── Stats bar ── */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
.stat-card {
  background: var(--s1); border: 1px solid var(--border); border-radius: 8px;
  padding: 18px 20px;
}
.stat-card .num { font-family: 'Syne', sans-serif; font-size: 34px; font-weight: 800; color: var(--accent); line-height: 1; }
.stat-card .lbl { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 6px; }

/* ── Tabs ── */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
.tab {
  padding: 10px 22px; font-family: 'DM Mono', monospace; font-size: 11px;
  letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
  cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── Filter bar ── */
.filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.fbtn {
  padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: transparent; color: var(--muted);
  font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; transition: all .2s;
}
.fbtn.active { border-color: var(--accent); color: var(--accent); background: rgba(74,222,128,.06); }
.fbtn:hover { border-color: var(--accent2); color: var(--accent2); }
.search-input {
  margin-left: auto; background: var(--s1); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 12px; padding: 6px 12px; outline: none; width: 200px; transition: border .2s;
}
.search-input:focus { border-color: var(--accent2); }

/* ── Job cards ── */
.jobs-list { display: flex; flex-direction: column; gap: 14px; }
.job-card {
  background: var(--s1); border: 1px solid var(--border); border-radius: 10px;
  padding: 22px 24px; position: relative; overflow: hidden;
  transition: border-color .2s, transform .15s;
  animation: fadeUp .3s ease forwards; opacity: 0; transform: translateY(8px);
}
@keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
.job-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
}
.job-card.s-high::before { background: var(--accent); }
.job-card.s-mid::before  { background: var(--warn); }
.job-card.s-low::before  { background: var(--danger); }
.job-card:hover { border-color: #2a3a5a; transform: translateY(-1px); }

.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 12px; }
.card-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
.card-meta  { font-size: 12px; color: var(--muted); }
.card-meta .co { color: var(--accent2); }
.score-ring {
  font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800;
  min-width: 48px; text-align: right; flex-shrink: 0;
}
.s-high .score-ring { color: var(--accent); }
.s-mid  .score-ring { color: var(--warn); }
.s-low  .score-ring { color: var(--danger); }

.reason-block {
  background: var(--s2); border-radius: 6px; padding: 10px 14px;
  font-size: 12px; color: #94a3b8; line-height: 1.6; margin-bottom: 10px;
}
.hook-block {
  background: rgba(56,189,248,.05); border: 1px solid rgba(56,189,248,.15);
  border-radius: 6px; padding: 10px 14px; margin-bottom: 12px;
}
.hook-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--accent2); margin-bottom: 6px; text-transform: uppercase; }
.hook-text  { font-size: 12px; color: #bae6fd; line-height: 1.7; font-style: italic; }

.card-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.tag { font-family: 'DM Mono', monospace; font-size: 10px; padding: 3px 8px; border-radius: 3px; background: var(--s2); color: var(--muted); letter-spacing: 1px; }
.tag.source { color: var(--accent2); border: 1px solid rgba(56,189,248,.2); }
.tag.loc    { color: #a78bfa; border: 1px solid rgba(167,139,250,.2); }
.btn-apply {
  margin-left: auto; padding: 7px 16px; border-radius: 6px; border: none;
  background: var(--accent); color: #000; font-family: 'DM Mono', monospace;
  font-size: 11px; font-weight: 500; cursor: pointer; transition: all .2s; letter-spacing: 1px;
  text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
}
.btn-apply:hover { background: #86efac; }
.btn-copy {
  padding: 7px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); font-family: 'DM Mono', monospace;
  font-size: 11px; cursor: pointer; transition: all .2s;
}
.btn-copy:hover { border-color: var(--accent2); color: var(--accent2); }

/* ── Log tab ── */
.log-entry {
  background: var(--s1); border: 1px solid var(--border); border-radius: 8px;
  padding: 18px 22px; margin-bottom: 12px;
}
.log-date { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent2); margin-bottom: 10px; }
.log-summary { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-bottom: 12px; letter-spacing: 1px; }
.log-job-row {
  display: flex; align-items: center; gap: 10px; padding: 6px 0;
  border-top: 1px solid var(--border); font-size: 12px;
}
.log-score { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; min-width: 32px; }
.log-score.high { color: var(--accent); }
.log-score.mid  { color: var(--warn); }
.log-score.low  { color: var(--danger); }
.log-title { flex: 1; color: var(--text); }
.log-source { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }

/* ── Empty state ── */
.empty { text-align: center; padding: 80px 20px; color: var(--muted); }
.empty-icon { font-size: 48px; margin-bottom: 16px; opacity: .4; }
.empty p { font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 28px; right: 28px; z-index: 999;
  background: var(--s2); border: 1px solid var(--accent);
  color: var(--accent); font-family: 'DM Mono', monospace; font-size: 12px;
  padding: 10px 18px; border-radius: 6px; letter-spacing: 1px;
  transform: translateY(60px); opacity: 0; transition: all .3s;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* ── Loading ── */
.loading { text-align: center; padding: 60px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent); letter-spacing: 3px; }
.loading::after { content: ''; animation: dots 1.2s steps(4,end) infinite; }
@keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }

@media(max-width:700px) {
  .stats-row { grid-template-columns: repeat(2,1fr); }
  .card-top { flex-direction: column; }
  .score-ring { font-size: 20px; }
  header { flex-direction: column; gap: 10px; text-align: center; }
}
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo">HUNT</div>
  <div class="run-info" id="run-info">Loading…</div>
</header>

<div class="stats-row">
  <div class="stat-card"><div class="num" id="s-today">—</div><div class="lbl">Today's Picks</div></div>
  <div class="stat-card"><div class="num" id="s-avg">—</div><div class="lbl">Avg Score</div></div>
  <div class="stat-card"><div class="num" id="s-high">—</div><div class="lbl">High Score ≥8</div></div>
  <div class="stat-card"><div class="num" id="s-total">—</div><div class="lbl">Total Logged</div></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('today',this)">Today's Jobs</div>
  <div class="tab" onclick="switchTab('log',this)">Run Log</div>
</div>

<!-- Today's jobs -->
<div class="tab-content active" id="tab-today">
  <div class="filter-bar">
    <button class="fbtn active" onclick="filterCards('all',this)">All</button>
    <button class="fbtn" onclick="filterCards('high',this)">Score ≥ 8</button>
    <button class="fbtn" onclick="filterCards('mid',this)">Score 6-7</button>
    <button class="fbtn" onclick="filterCards('un',this)">UN / OECD</button>
    <button class="fbtn" onclick="filterCards('upwork',this)">Upwork</button>
    <input class="search-input" id="search" placeholder="Search title / company…" oninput="renderFiltered()" />
  </div>
  <div class="jobs-list" id="jobs-list">
    <div class="loading">Loading jobs</div>
  </div>
</div>

<!-- Log -->
<div class="tab-content" id="tab-log">
  <div id="log-list"><div class="loading">Loading log</div></div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
let ALL_JOBS = [];
let ALL_LOG  = [];
let currentFilter = 'all';

// ── Data loading ──────────────────────────────────────────────────────────────
// In production (GitHub Pages / Vercel), these files are served statically.
// Add ?bust= to avoid browser cache when data updates daily.
async function load_data() {
  const bust = '?t=' + Math.floor(Date.now() / 60000); // 1-minute cache
  try {
    const [r1, r2] = await Promise.all([
      fetch('../data/jobs_today.json' + bust),
      fetch('../data/job_log.json'    + bust)
    ]);
    ALL_JOBS = r1.ok ? await r1.json() : [];
    ALL_LOG  = r2.ok ? await r2.json() : [];
  } catch (e) {
    // If running locally from file://, load sample data for preview
    ALL_JOBS = SAMPLE_JOBS;
    ALL_LOG  = SAMPLE_LOG;
  }
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  update_stats();
  render_run_info();
  renderFiltered();
  render_log();
}

function update_stats() {
  const high = ALL_JOBS.filter(j => j.score >= 8).length;
  const avg  = ALL_JOBS.length ? (ALL_JOBS.reduce((s,j) => s + j.score, 0) / ALL_JOBS.length).toFixed(1) : '—';
  const total_logged = ALL_LOG.reduce((s, r) => s + (r.jobs || []).length, 0);
  document.getElementById('s-today').textContent = ALL_JOBS.length;
  document.getElementById('s-avg').textContent   = avg;
  document.getElementById('s-high').textContent  = high;
  document.getElementById('s-total').textContent = total_logged;
}

function render_run_info() {
  const el = document.getElementById('run-info');
  if (ALL_LOG.length) {
    const last = ALL_LOG[0];
    el.innerHTML = `Last run <span>${last.run_date}</span> &nbsp;·&nbsp; Fetched <span>${last.raw_fetched}</span> &nbsp;·&nbsp; Approved <span>${last.approved}</span>`;
  } else {
    el.textContent = 'No runs yet — trigger workflow manually in GitHub Actions';
  }
}

function renderFiltered() {
  const q = (document.getElementById('search')?.value || '').toLowerCase();
  let jobs = ALL_JOBS;

  if (currentFilter === 'high')   jobs = jobs.filter(j => j.score >= 8);
  if (currentFilter === 'mid')    jobs = jobs.filter(j => j.score >= 6 && j.score < 8);
  if (currentFilter === 'un')     jobs = jobs.filter(j => ['UN Talent','UNDP RSS','OECD'].includes(j.source));
  if (currentFilter === 'upwork') jobs = jobs.filter(j => j.source === 'Upwork');

  if (q) jobs = jobs.filter(j => (j.title + j.company + j.description).toLowerCase().includes(q));

  const list = document.getElementById('jobs-list');
  if (jobs.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>No jobs match this filter</p></div>';
    return;
  }
  list.innerHTML = '';
  jobs.forEach((j, i) => {
    const card = make_card(j);
    card.style.animationDelay = `${i * 0.04}s`;
    list.appendChild(card);
  });
}

function make_card(j) {
  const sc_class = j.score >= 8 ? 's-high' : j.score >= 6 ? 's-mid' : 's-low';
  const loc_tag  = j.location ? `<span class="tag loc">${j.location}</span>` : '';
  const apply_btn = j.url
    ? `<a class="btn-apply" href="${j.url}" target="_blank" rel="noopener">Apply ↗</a>`
    : '';

  const div = document.createElement('div');
  div.className = `job-card ${sc_class}`;
  div.innerHTML = `
    <div class="card-top">
      <div>
        <div class="card-title">${j.title}</div>
        <div class="card-meta"><span class="co">${j.company}</span> &nbsp;·&nbsp; ${j.date}</div>
      </div>
      <div class="score-ring">${j.score}<span style="font-size:14px;opacity:.5">/10</span></div>
    </div>
    ${j.match_reason ? `<div class="reason-block">${j.match_reason}</div>` : ''}
    ${j.hook ? `<div class="hook-block"><div class="hook-label">✦ Tailored Hook</div><div class="hook-text">${j.hook}</div></div>` : ''}
    <div class="card-footer">
      <span class="tag source">${j.source}</span>
      ${loc_tag}
      ${j.hook ? `<button class="btn-copy" onclick="copy_hook(this,'${j.id}')">📋 Copy Hook</button>` : ''}
      ${apply_btn}
    </div>`;
  return div;
}

function render_log() {
  const el = document.getElementById('log-list');
  if (!ALL_LOG.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><p>No runs logged yet</p></div>';
    return;
  }
  el.innerHTML = ALL_LOG.map(r => {
    const job_rows = (r.jobs || []).map(j => {
      const sc_cls = j.score >= 8 ? 'high' : j.score >= 6 ? 'mid' : 'low';
      return `<div class="log-job-row">
        <span class="log-score ${sc_cls}">${j.score}</span>
        <span class="log-title">${j.title} <span style="color:var(--muted)">@ ${j.company}</span></span>
        <span class="log-source">${j.source}</span>
      </div>`;
    }).join('');
    return `<div class="log-entry">
      <div class="log-date">${r.run_date} &nbsp;·&nbsp; ${r.run_time ? r.run_time.slice(11,16) + ' UTC' : ''}</div>
      <div class="log-summary">
        Fetched ${r.raw_fetched} → Dedup ${r.after_dedup} → Filter ${r.after_filter} → Approved ${r.approved}
      </div>
      ${job_rows}
    </div>`;
  }).join('');
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

function filterCards(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFiltered();
}

function copy_hook(btn, id) {
  const job = ALL_JOBS.find(j => j.id === id);
  if (!job?.hook) return;
  navigator.clipboard.writeText(job.hook).then(() => toast('Hook copied ✓'));
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Sample data (shown when no data files exist yet) ─────────────────────────
const SAMPLE_JOBS = [
  { id:'sample_1', title:'L&D Consultant — Sustainability Programs', company:'Palladium', location:'Remote', source:'UN Talent', date: new Date().toISOString().slice(0,10), score:9, match_reason:'Perfect alignment: Palladium is a top-tier international development firm seeking an L&D specialist with sustainability expertise. Candidate\'s UN ESCAP background and BI curriculum development directly match the role requirements.', hook:'Having spent time at UN ESCAP producing content for the Asia-Pacific Economic Survey and subsequently designing a BI curriculum for 300+ executives, I bring exactly the combination of analytical rigour and learning design that Palladium\'s sustainability programmes require.', url:'https://example.com/apply' },
  { id:'sample_2', title:'ESG Strategy Advisor', company:'GIZ', location:'Bangkok, Thailand', source:'OECD', date: new Date().toISOString().slice(0,10), score:8, match_reason:'Strong match: GIZ is a leading German development agency with active Southeast Asia operations. ESG advisory aligns with candidate\'s PhD specialism and UNOG SDG Lab experience. Bangkok location matches candidate\'s preferred geography.', hook:'My doctoral research on ESG-integrated asset pricing, combined with hands-on stakeholder facilitation at the UNOG SDG Lab, positions me to translate sustainable development frameworks into tangible corporate strategy — precisely what this GIZ advisory role demands.', url:'https://example.com/apply2' },
  { id:'sample_3', title:'Corporate Training Consultant', company:'Upwork Client', location:'Remote', source:'Upwork', date: new Date().toISOString().slice(0,10), score:7, match_reason:'Good match: Remote freelance consulting role focused on executive training delivery. Directly maps to candidate\'s 3-year experience facilitating MBA programmes for senior professionals.', hook:'After three years designing and delivering business analytics and ESG curricula to C-suite executives across manufacturing, finance, and retail, I have developed a reliable method for making complex frameworks immediately actionable for non-technical leaders.', url:'https://example.com/apply3' },
];
const SAMPLE_LOG = [
  { run_date: new Date().toISOString().slice(0,10), run_time: new Date().toISOString(), raw_fetched: 73, after_dedup: 41, after_filter: 18, approved: 3, jobs: SAMPLE_JOBS.map(j => ({ id:j.id, title:j.title, company:j.company, score:j.score, source:j.source, url:j.url, status:'new' })) }
];

// ── Start ─────────────────────────────────────────────────────────────────────
load_data();
</script>
</body>
</html>
